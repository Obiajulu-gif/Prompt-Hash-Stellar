name: Backend CI

on:
  pull_request:
    paths:
      - ".github/workflows/backend.yml"
      - "server/**"
  push:
    branches:
      - main
      - develop
    paths:
      - ".github/workflows/backend.yml"
      - "server/**"

permissions:
  contents: read

jobs:
  backend:
    name: Build and Validate Server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Detect available npm scripts
        id: scripts
        run: |
          node -e "
          const fs = require('fs');
          const pkg = require('./package.json');
          const s = pkg.scripts || {};
          const has = (n) => Boolean(s[n]) ? 'true' : 'false';
          const isPH = (s.test || '').includes('no test specified');

          let out = 'has_lint=' + has('lint') + '\n';
          out += 'has_test=' + (s.test && !isPH ? 'true' : 'false') + '\n';
          out += 'has_build=' + has('build') + '\n';

          console.log('Detected Scripts:\n' + out);

          if (process.env.GITHUB_OUTPUT) {
            fs.appendFileSync(process.env.GITHUB_OUTPUT, out);
          }
          "

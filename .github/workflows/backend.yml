name: Backend CI

on:
  pull_request:
    paths:
      - ".github/workflows/backend.yml"
      - "server/**"
  push:
    branches:
      - main
      - develop
    paths:
      - ".github/workflows/backend.yml"
      - "server/**"

permissions:
  contents: read

jobs:
  backend:
    name: Build and Validate Server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: server/yarn.lock

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack yarn install --immutable

      - name: Detect available npm scripts
        id: scripts
        run: |
          node ../.github/scripts/check-scripts.js

      - name: Run lint
        if: steps.scripts.outputs.has_lint == 'true'
        run: corepack yarn lint --if-present

      - name: Run tests
        if: steps.scripts.outputs.has_test == 'true'
        run: corepack yarn test --if-present

      - name: Build backend
        if: steps.scripts.outputs.has_build == 'true'
        run: corepack yarn build --if-present
